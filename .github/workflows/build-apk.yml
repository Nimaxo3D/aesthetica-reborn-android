name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify project layout
        run: |
          test -f android/gradlew
          test -f android/settings.gradle
          test -f android/capacitor-android/capacitor/build.gradle
          test -f android/app/src/main/assets/public/index.html
          echo "Project layout OK"

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aesthetica-reborn-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
